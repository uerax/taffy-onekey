
- name: 'vless-${name}'
  type: vless
  port: ${port} 
  listen: "::"
  users:
    - username: ${publicKey}
      uuid: ${password}
      flow: xtls-rprx-vision
  reality-config:
    dest: ${reality_sni}:443
    private-key: ${privateKey}
    short-id:
      - "${shortId}"
      - ""
    server-names:
      - ${reality_sni}
